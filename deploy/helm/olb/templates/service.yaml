apiVersion: v1
kind: Service
metadata:
  name: {{ include "olb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "olb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "olb.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http }}
      targetPort: http
      protocol: TCP
    - name: https
      port: {{ .Values.service.ports.https }}
      targetPort: https
      protocol: TCP
    - name: admin
      port: {{ .Values.service.ports.admin }}
      targetPort: admin
      protocol: TCP
  sessionAffinity: None
