apiVersion: apps/v1
kind: Deployment
metadata:
  name: olb
  namespace: default
  labels:
    app.kubernetes.io/name: olb
    app.kubernetes.io/instance: olb
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: load-balancer
    app.kubernetes.io/part-of: openloadbalancer
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: olb
      app.kubernetes.io/instance: olb
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: olb
        app.kubernetes.io/instance: olb
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: load-balancer
        app.kubernetes.io/part-of: openloadbalancer
      annotations:
        kubectl.kubernetes.io/restartedAt: ""
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: olb
          image: openloadbalancer/olb:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-config"
            - "/etc/olb/olb.yaml"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: admin
              containerPort: 8080
              protocol: TCP
            - name: cluster
              containerPort: 7946
              protocol: TCP
          env:
            - name: OLB_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/v1/system/health
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /api/v1/system/health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config
              mountPath: /etc/olb
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: olb-config
        - name: tmp
          emptyDir: {}
