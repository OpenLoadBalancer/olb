version: '3.8'

services:
  olb:
    image: ghcr.io/openloadbalancer/olb:latest
    container_name: olb
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8081:8081"  # Admin API
      - "8082:8082"  # MCP Server
    volumes:
      - ./configs/olb.yaml:/etc/olb/configs/olb.yaml:ro
      - ./certs:/etc/olb/certs:ro
      - olb-logs:/var/log/olb
    environment:
      - OLB_CONFIG=/etc/olb/configs/olb.yaml
      - OLB_LOG_LEVEL=info
    networks:
      - olb-network
    healthcheck:
      test: ["CMD", "olb", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    read_only: true
    tmpfs:
      - /tmp

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: olb-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - olb-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: olb-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/olb.json:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - olb-network
    depends_on:
      - prometheus

  # Alertmanager for notifications
  alertmanager:
    image: prom/alertmanager:latest
    container_name: olb-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    read_only: true
    tmpfs:
      - /tmp
    networks:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: olb-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    networks:
      - olb-network

  # Redis for distributed rate limiting (optional)
  redis:
    image: redis:7-alpine
    container_name: olb-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - olb-network
    profiles:
      - distributed-rate-limit

volumes:
  olb-logs:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  redis-data:

networks:
  olb-network:
    driver: bridge
