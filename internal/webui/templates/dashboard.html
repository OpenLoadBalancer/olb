{{define "dashboard"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - OpenLoadBalancer</title>
    <link rel="stylesheet" href="/static/css/design.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="stylesheet" href="/static/css/accessibility.css">
</head>
<body>
    <!-- Skip to content link for keyboard navigation -->
    <a href="#app-content" class="skip-link">Skip to main content</a>

    <div class="app-layout">
        <aside class="sidebar" role="complementary" aria-label="Sidebar navigation">
            <div class="sidebar-header">
                <h1 class="logo">OLB</h1>
                <span class="version">{{.Version}}</span>
            </div>

            <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
                <a href="#/dashboard" class="nav-item active" data-nav="/dashboard" aria-current="page">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <span class="nav-text">Dashboard</span>
                </a>
                <a href="#/backends" class="nav-item" data-nav="/backends">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <ellipse cx="12" cy="5" rx="9" ry="3"/>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                    </svg>
                    <span class="nav-text">Backends</span>
                </a>
                <a href="#/routes" class="nav-item" data-nav="/routes">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <span class="nav-text">Routes</span>
                </a>
                <a href="#/metrics" class="nav-item" data-nav="/metrics">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M18 20V10"/>
                        <path d="M12 20V4"/>
                        <path d="M6 20v-6"/>
                    </svg>
                    <span class="nav-text">Metrics</span>
                </a>
                <a href="#/logs" class="nav-item" data-nav="/logs">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <span class="nav-text">Logs</span>
                </a>
                <a href="#/config" class="nav-item" data-nav="/config">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span class="nav-text">Config</span>
                </a>
                <a href="#/certs" class="nav-item" data-nav="/certs">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <span class="nav-text">Certificates</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="connection-status" id="connection-status" role="status" aria-live="polite" aria-label="Connection status">
                    <span class="status-dot connected" aria-hidden="true"></span>
                    <span class="status-text">Connected</span>
                </div>
            </div>
        </aside>

        <main class="main-content" role="main">
            <div class="page-content" id="app-content" role="region" aria-label="Dashboard content"></div>
        </main>
    </div>

    <script src="/static/js/spa.js"></script>
    <script src="/static/js/pages/dashboard.js"></script>
    <script>
        // Initialize SPA and mount dashboard
        document.addEventListener('DOMContentLoaded', function() {
            // Define dashboard route
            OLBSPA.route('/dashboard', function(ctx) {
                OLBSPA.mount('#app-content', 'dashboard');
            }, { title: 'Dashboard' });

            // Initialize SPA
            OLBSPA.init();

            // Update connection status via WebSocket
            const wsUrl = 'ws://' + window.location.host + '/ws';
            const ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                const status = document.getElementById('connection-status');
                if (status) {
                    status.querySelector('.status-dot').className = 'status-dot connected';
                    status.querySelector('.status-text').textContent = 'Connected';
                }
            };

            ws.onclose = function() {
                const status = document.getElementById('connection-status');
                if (status) {
                    status.querySelector('.status-dot').className = 'status-dot disconnected';
                    status.querySelector('.status-text').textContent = 'Disconnected';
                }
            };
        });
    </script>
</body>
</html>
{{end}}
