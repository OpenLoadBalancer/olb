name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master, develop]

env:
  GO_VERSION: '1.25'

jobs:
  # Job 1: Lint and Format Check
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gofmt
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: go staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest 2>/dev/null || true
          which staticcheck && staticcheck ./... || echo "staticcheck not available, skipping"

  # Job 2: Test (without race detector for fast feedback)
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ===== FRONTEND BUILD SETUP =====
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        working-directory: ./internal/webui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./internal/webui
        run: pnpm build
      # ===== END FRONTEND BUILD =====

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -count=1 -coverprofile=coverage.out -timeout=300s ./...

      - name: Generate coverage report
        run: go tool cover -func=coverage.out

      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          THRESHOLD=85
          echo "Total coverage: ${COVERAGE}%"
          echo "Required threshold: ${THRESHOLD}%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage check passed"

      - name: Upload coverage to Codecov
        if: matrix.go-version == env.GO_VERSION
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  # Job 3: Race Detector Tests (Linux only, requires CGO/GCC)
  test-race:
    name: Test (Race Detector)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ===== FRONTEND BUILD SETUP =====
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        working-directory: ./internal/webui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./internal/webui
        run: pnpm build
      # ===== END FRONTEND BUILD =====

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        run: go test -race -count=1 -timeout=600s ./...

  # Job 4: Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ===== FRONTEND BUILD SETUP =====
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        working-directory: ./internal/webui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./internal/webui
        run: pnpm build
      # ===== END FRONTEND BUILD =====

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build binary
        run: make build

      - name: Check binary size
        run: |
          BINARY="bin/olb"
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: Binary not found at $BINARY"
            exit 1
          fi
          SIZE=$(stat --format=%s "$BINARY")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Binary size: ${SIZE} bytes (${SIZE_MB} MB)"
          MAX_SIZE=$((20 * 1024 * 1024))
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "ERROR: Binary size ${SIZE_MB}MB exceeds 20MB limit"
            exit 1
          fi
          echo "PASS: Binary size is within the 20MB limit"

      - name: Measure startup time
        run: |
          BINARY="bin/olb"
          echo "Measuring startup time (olb version)..."
          # Warm up filesystem cache
          "$BINARY" version > /dev/null 2>&1 || true
          # Measure 5 runs
          TOTAL=0
          for i in 1 2 3 4 5; do
            START=$(date +%s%N)
            "$BINARY" version > /dev/null 2>&1 || true
            END=$(date +%s%N)
            ELAPSED=$(( (END - START) / 1000000 ))
            echo "  Run $i: ${ELAPSED}ms"
            TOTAL=$((TOTAL + ELAPSED))
          done
          AVG=$((TOTAL / 5))
          echo "Average startup time: ${AVG}ms"
          if [ "$AVG" -gt 5000 ]; then
            echo "WARNING: Startup time exceeds 5 seconds"
          fi

      - name: Build all platforms
        run: make build-all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  # Job 5: Integration Tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run integration tests
        run: go test -v -count=1 -p 1 -tags=integration -timeout=300s ./test/...

  # Job 6: Benchmark
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 -run=^$ -timeout=600s ./... | tee benchmark.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.txt
          retention-days: 30

  # Job 7: Docker Build
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: openloadbalancer/olb:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 9: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-severity high -quiet ./...'

      - name: Run Nancy (dependency vulnerability scanner)
        run: |
          go install github.com/sonatypecommunity/nancy@latest
          go list -json -deps ./... | nancy sleuth
        continue-on-error: true

  # Job 10: Binary Analysis
  binary:
    name: Binary Analysis
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin/

      - name: Binary size analysis
        run: |
          ls -lh bin/
          for f in bin/olb-*; do
            SIZE=$(stat -c%s "$f")
            echo "$f: $SIZE bytes"
            if [ "$SIZE" -gt 20971520 ]; then
              echo "ERROR: $f exceeds 20MB limit"
              exit 1
            fi
          done

      - name: Binary verification
        run: |
          file bin/olb-linux-amd64
          bin/olb-linux-amd64 version

      - name: Check for debug symbols
        run: |
          if nm bin/olb-linux-amd64 2>/dev/null | head -5 | grep -q "T main"; then
            echo "WARNING: Binary contains debug symbols"
          else
            echo "Debug symbols stripped: OK"
          fi

  # Job 11: Release
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, integration, test-race, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build release binaries
        run: make build-all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          draft: true
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
