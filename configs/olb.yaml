# OpenLoadBalancer Full Configuration Example
# All fields are optional — sensible defaults are used.

version: "1"

# Admin API
admin:
  address: "127.0.0.1:8081"
  mcp_address: "127.0.0.1:8082"  # MCP server (SSE + HTTP)
  mcp_token: ""                   # Bearer token for MCP auth (empty = no auth)
  mcp_audit: true                 # Log all MCP tool calls

# Middleware configuration (all disabled by default)
middleware:
  rate_limit:
    enabled: true
    requests_per_second: 1000
    burst_size: 2000
  cors:
    enabled: true
    allowed_origins:
      - "*"
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
  compression:
    enabled: true
    min_size: 256
    level: 6
  ip_filter:
    enabled: false
    default_action: allow
  headers:
    enabled: true
    response_add:
      X-Powered-By: OpenLoadBalancer
  timeout:
    enabled: true
    timeout: "60s"
  max_body_size:
    enabled: true
    max_size: 10485760  # 10 MB
  circuit_breaker:
    enabled: true
    error_threshold: 50
  retry:
    enabled: true
  cache:
    enabled: false

# WAF (Web Application Firewall)
waf:
  enabled: true
  mode: block

# TLS configuration
tls:
  cert_file: /etc/olb/certs/server.crt
  key_file: /etc/olb/certs/server.key

# Listeners
listeners:
  - name: http
    protocol: http
    address: ":8080"
    routes:
      - name: api
        path: /api
        pool: api-backend
      - name: default
        path: /
        pool: web-backend

# Backend pools
pools:
  - name: web-backend
    algorithm: round_robin
    health_check:
      type: http
      path: /health
      interval: 10s
      timeout: 5s
    backends:
      - id: web-1
        address: "10.0.1.10:8080"
        weight: 1
      - id: web-2
        address: "10.0.1.11:8080"
        weight: 1
      - id: web-3
        address: "10.0.1.12:8080"
        weight: 1
  - name: api-backend
    algorithm: least_connections
    health_check:
      type: http
      path: /api/health
      interval: 5s
      timeout: 3s
    backends:
      - id: api-1
        address: "10.0.2.10:8080"
        weight: 3
      - id: api-2
        address: "10.0.2.11:8080"
        weight: 2

# Logging
logging:
  level: info
  format: json

# Profiling (disabled by default — enable for debugging)
profiling:
  enabled: false
  pprof_addr: "localhost:6060"

# Geo-DNS Routing (optional)
geodns:
  enabled: false
  default_pool: default-pool
  rules:
    - id: us-traffic
      country: US
      pool: us-pool
      fallback: default-pool
    - id: eu-traffic
      country: EU
      pool: eu-pool
    - id: asia-traffic
      country: JP
      region: Tokyo
      pool: asia-pool

# Request Shadowing/Mirroring (optional)
shadow:
  enabled: false
  percentage: 10.0  # Mirror 10% of traffic
  copy_headers: true
  copy_body: false
  timeout: 30s
  targets:
    - pool: staging-pool
      percentage: 100.0
